                explanation: '鉴定红果番茄（R_）基因型的最佳方法是测交，即与隐性纯合子黄果番茄（rr）杂交。若后代全为红果，说明原植株为纯合子（RR）；若后代出现黄果，说明原植株为杂合子（Rr）。番茄是自花传粉植物，自交同样可以用来鉴定（若后代出现黄果则为杂合子），因此C选项错误。与红果纯合子（RR）杂交，后代全是红果，无法区分，因此A错误。'

                                                    </div>
                                                    <button onClick={() => setBookmarked(prev => ({ ...prev, [currentQuestion.id]: !prev[currentQuestion.id] }))}
                                                        className={`p-2 rounded-xl border transition ${bookmarked[currentQuestion.id] ? 'bg-amber-50 border-amber-300 text-amber-600' : 'bg-slate-50 border-slate-200 text-slate-400 hover:text-amber-500'}`}>
                                                        <Icon name="BookMarked" className="w-5 h-5" />
                                                    </button>
                                                </div>

                                                <div className="prose prose-slate max-w-none text-sm sm:text-base leading-relaxed whitespace-pre-wrap bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                                    {currentQuestion.question}
                                                </div>

                                                {currentQuestion.type === 'MCQ' ? (
                                                    <div className="space-y-4">
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                            {currentQuestion.options.map(opt => {
                                                                const isSelected = userAnswers[currentQuestion.id] === opt.key;
                                                                const isSubmitted = submittedAnswers[currentQuestion.id];
                                                                const isCorrectAnswer = currentQuestion.answer === opt.key;
                                                                let optionStyle = 'border-slate-200 bg-white hover:bg-slate-50';
                                                                if (isSubmitted && isSelected) {
                                                                    optionStyle = isCorrectAnswer ? 'border-emerald-500 bg-emerald-50 ring-2 ring-emerald-100' : 'border-rose-500 bg-rose-50 ring-2 ring-rose-100';
                                                                } else if (isSubmitted && isCorrectAnswer) {
                                                                    optionStyle = 'border-emerald-500 bg-emerald-50';
                                                                } else if (!isSubmitted && isSelected) {
                                                                    optionStyle = 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-100';
                                                                }
                                                                return (
                                                                    <button key={opt.key}
                                                                        onClick={() => {
                                                                            if (!submittedAnswers[currentQuestion.id]) {
                                                                                setUserAnswers(prev => ({ ...prev, [currentQuestion.id]: opt.key }));
                                                                            }
                                                                        }}
                                                                        disabled={submittedAnswers[currentQuestion.id]}
                                                                        className={`p-4 rounded-xl border text-left flex items-start space-x-3 transition-all ${optionStyle} ${submittedAnswers[currentQuestion.id] ? 'cursor-default' : 'cursor-pointer'}`}>
                                                                        <span className="font-extrabold text-sm w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center shrink-0 mt-0.5">{opt.key}</span>
                                                                        <span className="text-sm font-medium text-slate-700">{opt.text}</span>
                                                                    </button>
                                                                );
                                                            })}
                                                        </div>
                                                        {!submittedAnswers[currentQuestion.id] ? (
                                                            <button onClick={() => {
                                                                if (userAnswers[currentQuestion.id]) {
                                                                    setSubmittedAnswers(prev => ({ ...prev, [currentQuestion.id]: true }));
                                                                    setShowExplanation(prev => ({ ...prev, [currentQuestion.id]: true }));
                                                                }
                                                            }}
                                                                disabled={!userAnswers[currentQuestion.id]}
                                                                className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition text-sm">
                                                                提交答案并查看解析
                                                            </button>
                                                        ) : (
                                                            <div className="space-y-3">
                                                                <div className={`p-4 rounded-xl flex items-start gap-3 ${userAnswers[currentQuestion.id] === currentQuestion.answer ? 'bg-emerald-50 border border-emerald-200' : 'bg-rose-50 border border-rose-200'}`}>
                                                                    <Icon name={userAnswers[currentQuestion.id] === currentQuestion.answer ? 'CheckCircle2' : 'XCircle'} className="w-5 h-5 shrink-0 mt-0.5" />
                                                                    <div>
                                                                        <p className="font-extrabold text-sm">{userAnswers[currentQuestion.id] === currentQuestion.answer ? '回答正确！' : '回答错误'}</p>
                                                                        <p className="text-xs text-slate-600 mt-1">正确答案：{currentQuestion.answer}</p>
                                                                    </div>
                                                                </div>
                                                                {showExplanation[currentQuestion.id] && (
                                                                    <div className="bg-indigo-50/50 border border-indigo-100 rounded-xl p-5 space-y-2 animate-fade-in">
                                                                        <p className="text-xs font-extrabold text-indigo-800 flex items-center gap-1">
                                                                            <Icon name="BrainCircuit" className="w-3.5 h-3.5" /> 详细解析
                                                                        </p>
                                                                        <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{currentQuestion.explanation}</p>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    /* FRQ 大题界面 */
                                                    <div className="space-y-6">
                                                        <div className="space-y-2">
                                                            <label className="text-xs font-extrabold text-slate-500">📝 你的作答草稿与答案：</label>
                                                            <textarea
                                                                value={userFrqInput[currentQuestion.id] || ''}
                                                                onChange={(e) => setUserFrqInput(prev => ({ ...prev, [currentQuestion.id]: e.target.value }))}
                                                                placeholder="在这里写下你的答案思路、关键步骤或完整表述……"
                                                                className="w-full h-40 p-4 text-sm border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 resize-y"
                                                            />
                                                        </div>
                                                        <div className="flex flex-wrap gap-3">
                                                            <button onClick={() => {
                                                                setSubmittedAnswers(prev => ({ ...prev, [currentQuestion.id]: true }));
                                                                setShowExplanation(prev => ({ ...prev, [currentQuestion.id]: true }));
                                                            }}
                                                                className="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition text-sm">
                                                                提交并查看参考答案
                                                            </button>
                                                            {submittedAnswers[currentQuestion.id] && (
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => setFrqGrades(prev => ({ ...prev, [currentQuestion.id]: 'correct' }))}
                                                                        className={`px-4 py-2 text-xs font-bold rounded-xl border transition ${frqGrades[currentQuestion.id] === 'correct' ? 'bg-emerald-100 border-emerald-400 text-emerald-800' : 'bg-white border-slate-200 text-slate-600 hover:bg-emerald-50'}`}>
                                                                        <Icon name="Check" className="w-3.5 h-3.5 inline mr-1" /> 完全正确
                                                                    </button>
                                                                    <button onClick={() => setFrqGrades(prev => ({ ...prev, [currentQuestion.id]: 'incorrect' }))}
                                                                        className={`px-4 py-2 text-xs font-bold rounded-xl border transition ${frqGrades[currentQuestion.id] === 'incorrect' ? 'bg-rose-100 border-rose-400 text-rose-800' : 'bg-white border-slate-200 text-slate-600 hover:bg-rose-50'}`}>
                                                                        <Icon name="XCircle" className="w-3.5 h-3.5 inline mr-1" /> 有待加强
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                        {submittedAnswers[currentQuestion.id] && showExplanation[currentQuestion.id] && (
                                                            <div className="space-y-4 animate-fade-in">
                                                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-5">
                                                                    <h4 className="text-sm font-extrabold text-slate-900 mb-3 flex items-center gap-2">
                                                                        <Icon name="FileText" className="w-4 h-4 text-indigo-500" /> 标准参考答案
                                                                    </h4>
                                                                    <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{currentQuestion.modelAnswer}</p>
                                                                </div>
                                                                <div className="bg-amber-50/80 border border-amber-200 rounded-xl p-5">
                                                                    <h4 className="text-sm font-extrabold text-amber-900 mb-2 flex items-center gap-2">
                                                                        <Icon name="Sparkles" className="w-4 h-4" /> 自主评分踩分点
                                                                    </h4>
                                                                    <p className="text-sm text-amber-800 leading-relaxed whitespace-pre-wrap">{currentQuestion.evaluation}</p>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            {/* 上下题导航 */}
                                            <div className="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                                                <button onClick={() => setCurrentIdx(prev => Math.max(0, prev - 1))}
                                                    disabled={currentIdx === 0}
                                                    className="flex items-center gap-1 px-3 py-2 text-xs font-bold text-slate-600 hover:text-slate-900 disabled:opacity-40 disabled:cursor-not-allowed transition">
                                                    <Icon name="ChevronLeft" className="w-4 h-4" /> 上一题
                                                </button>
                                                <span className="text-xs text-slate-400 font-medium">{currentIdx + 1} / {filteredQuestions.length}</span>
                                                <button onClick={() => setCurrentIdx(prev => Math.min(filteredQuestions.length - 1, prev + 1))}
                                                    disabled={currentIdx === filteredQuestions.length - 1}
                                                    className="flex items-center gap-1 px-3 py-2 text-xs font-bold text-slate-600 hover:text-slate-900 disabled:opacity-40 disabled:cursor-not-allowed transition">
                                                    下一题 <Icon name="ChevronRight" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB 3: 动态模型（简版可视化） */}
                        {activeTab === 'visualizer' && (
                            <div className="space-y-10 animate-fade-in">
                                <div className="text-center max-w-2xl mx-auto space-y-3">
                                    <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-900 flex items-center justify-center gap-2">
                                        <Icon name="Sliders" className="w-7 h-7 text-indigo-500" /> 交互式生化与细胞机制演示
                                    </h2>
                                    <p className="text-sm text-slate-500">通过调节下方的开关与步骤，直观理解苯丙氨酸代谢缺陷和21三体形成机制。</p>
                                </div>

                                {/* 代谢通路模拟器 */}
                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 sm:p-8 space-y-6">
                                    <h3 className="text-lg font-extrabold text-slate-900 flex items-center gap-2">
                                        <Icon name="Dna" className="w-5 h-5 text-purple-600" /> 苯丙氨酸代谢途径与遗传病模拟
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="space-y-2">
                                            <div className="flex items-center justify-between">
                                                <span className="text-xs font-bold text-slate-600">酶① (苯丙氨酸→酪氨酸)</span>
                                                <button onClick={() => setEnzyme1Defective(!enzyme1Defective)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-full transition ${enzyme1Defective ? 'bg-rose-100 text-rose-700 border border-rose-300' : 'bg-emerald-100 text-emerald-700 border border-emerald-300'}`}>
                                                    {enzyme1Defective ? '🔴 缺陷' : '🟢 正常'}
                                                </button>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-300 ${enzyme1Defective ? 'w-0 bg-rose-400' : 'w-full bg-emerald-400'}`} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex items-center justify-between">
                                                <span className="text-xs font-bold text-slate-600">酶③ (酪氨酸→尿黑酸)</span>
                                                <button onClick={() => setEnzyme3Defective(!enzyme3Defective)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-full transition ${enzyme3Defective ? 'bg-rose-100 text-rose-700 border border-rose-300' : 'bg-emerald-100 text-emerald-700 border border-emerald-300'}`}>
                                                    {enzyme3Defective ? '🔴 缺陷' : '🟢 正常'}
                                                </button>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-300 ${enzyme3Defective ? 'w-0 bg-rose-400' : 'w-full bg-emerald-400'}`} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex items-center justify-between">
                                                <span className="text-xs font-bold text-slate-600">酶⑤ (酪氨酸→黑色素)</span>
                                                <button onClick={() => setEnzyme5Defective(!enzyme5Defective)}
                                                    className={`px-3 py-1 text-xs font-bold rounded-full transition ${enzyme5Defective ? 'bg-rose-100 text-rose-700 border border-rose-300' : 'bg-emerald-100 text-emerald-700 border border-emerald-300'}`}>
                                                    {enzyme5Defective ? '🔴 缺陷' : '🟢 正常'}
                                                </button>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-300 ${enzyme5Defective ? 'w-0 bg-rose-400' : 'w-full bg-emerald-400'}`} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 text-sm space-y-1">
                                        <p><strong>当前模拟结果：</strong></p>
                                        {enzyme5Defective && <p className="text-rose-700">⚠️ 缺乏酶⑤ → 酪氨酸无法转化为黑色素 → <strong>白化病</strong></p>}
                                        {enzyme3Defective && <p className="text-amber-700">⚠️ 缺乏酶③ → 尿黑酸积累 → <strong>尿黑酸症</strong></p>}
                                        {enzyme1Defective && <p className="text-purple-700">⚠️ 缺乏酶① → 苯丙氨酸无法转化为酪氨酸，可能经由酶②途径积累苯丙酮酸 → <strong>苯丙酮尿症风险</strong></p>}
                                        {!enzyme1Defective && !enzyme3Defective && !enzyme5Defective && <p className="text-emerald-700">✅ 所有酶正常，代谢途径通畅。</p>}
                                    </div>
                                </div>

                                {/* 减数分裂异常模拟器 */}
                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 sm:p-8 space-y-6">
                                    <h3 className="text-lg font-extrabold text-slate-900 flex items-center gap-2">
                                        <Icon name="BrainCircuit" className="w-5 h-5 text-indigo-600" /> 21三体综合征（唐氏）减数分裂异常演示
                                    </h3>
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <span className="text-xs font-bold text-slate-500">步骤：</span>
                                        {['间期复制', '联会四分体', '减Ⅰ后期', '减Ⅱ后期', '配子形成'].map((step, idx) => (
                                            <button key={idx} onClick={() => { setMeiosisStep(idx); setSimulateTrisomy(idx === 2 || idx === 3); }}
                                                className={`px-3 py-1.5 text-xs font-bold rounded-lg border transition ${meiosisStep === idx ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-indigo-50'}`}>
                                                {step}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <label className="text-xs font-bold text-slate-500">模拟异常分离：</label>
                                        <button onClick={() => setSimulateTrisomy(!simulateTrisomy)}
                                            className={`px-3 py-1 text-xs font-bold rounded-full transition ${simulateTrisomy ? 'bg-rose-100 text-rose-700 border border-rose-300' : 'bg-slate-100 text-slate-500 border border-slate-200'}`}>
                                            {simulateTrisomy ? '🔴 异常（21号不分离）' : '🟢 正常分离'}
                                        </button>
                                    </div>
                                    <div className="bg-indigo-50/50 border border-indigo-100 rounded-xl p-5 text-sm text-slate-700 leading-relaxed">
                                        {meiosisStep === 0 && <p>📌 间期：DNA复制完成，每条21号染色体包含两条姐妹染色单体。</p>}
                                        {meiosisStep === 1 && <p>📌 减Ⅰ前期：同源染色体联会形成四分体，可能发生交叉互换。</p>}
                                        {meiosisStep === 2 && (
                                            simulateTrisomy 
                                                ? <p>⚠️ <strong>减Ⅰ后期异常：</strong>21号同源染色体未分离，共同进入一个次级细胞，导致该细胞获得两条21号染色体。</p>
                                                : <p>✅ 减Ⅰ后期正常：同源染色体分离，分别进入两个子细胞。</p>
                                        )}
                                        {meiosisStep === 3 && (
                                            simulateTrisomy 
                                                ? <p>⚠️ <strong>减Ⅱ后期异常：</strong>姐妹染色单体未分离，同时移向一极，形成含有两条21号染色体的配子。</p>
                                                : <p>✅ 减Ⅱ后期正常：姐妹染色单体分开，每个子细胞获得一条21号染色体。</p>
                                        )}
                                        {meiosisStep === 4 && (
                                            simulateTrisomy 
                                                ? <p>🧬 <strong>结果：</strong>产生含有2条21号染色体的异常配子，与正常配子结合后，受精卵共有3条21号染色体 → <strong>唐氏综合征</strong>。</p>
                                                : <p>🧬 正常配子各含一条21号染色体，受精后恢复为2条。</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 4: 打印清单 */}
                        {activeTab === 'printable' && (
                            <div className="space-y-6 animate-fade-in print-area">
                                <div className="flex items-center justify-between no-print">
                                    <h2 className="text-xl font-extrabold text-slate-900 flex items-center gap-2">
                                        <Icon name="Printer" className="w-6 h-6 text-indigo-500" /> 核心习题打印清单
                                    </h2>
                                    <button onClick={() => window.print()}
                                        className="px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition text-sm flex items-center gap-2">
                                        <Icon name="Printer" className="w-4 h-4" /> 立即打印
                                    </button>
                                </div>
                                <p className="text-sm text-slate-500 no-print">以下为全部13道核心习题的题干汇总，适合线下自测或课堂使用。点击右上角按钮即可打印。</p>
                                <div className="space-y-8">
                                    {QUESTIONS.map((q, idx) => (
                                        <div key={q.id} className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="px-2 py-0.5 text-xs font-bold rounded-full bg-indigo-50 text-indigo-700">{idx+1}</span>
                                                <span className="text-xs text-slate-400">{q.type === 'MCQ' ? '选择题' : '非选择题'} · {q.difficulty}</span>
                                                <span className="text-xs font-medium text-slate-600 ml-auto">{CATEGORIES.find(c => c.id === q.category)?.name}</span>
                                            </div>
                                            <h3 className="text-base font-extrabold text-slate-900 mb-2">{q.title}</h3>
                                            <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{q.question}</p>
                                            {q.type === 'MCQ' && (
                                                <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
                                                    {q.options.map(opt => (
                                                        <div key={opt.key} className="text-sm text-slate-600 bg-slate-50 px-3 py-2 rounded-lg">
                                                            <span className="font-bold mr-1">{opt.key}.</span>{opt.text}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            <div className="mt-4 pt-4 border-t border-dashed border-slate-200 text-xs text-slate-400">
                                                参考答案：{q.type === 'MCQ' ? q.answer : '见详细解析（可在线查看）'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        // 渲染到页面
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
